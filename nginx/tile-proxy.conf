proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=tiles:100m max_size=10g inactive=24h use_temp_path=off;

server {
    listen 80;
    server_name localhost;
    client_max_body_size 20g;

    # 1. Frontend UI
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Backend API
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Titiler (Tiles)
    location /tiles/ {
        rewrite ^/tiles/(.*)$ /$1 break;
        proxy_pass http://titiler:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tile caching
        proxy_cache tiles;
        proxy_cache_valid 200 24h;
        proxy_cache_use_stale error timeout invalid_header updating;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 4. Martin (Vector Tiles)
    location /maps/ {
        rewrite ^/maps/(.*)$ /$1 break;
        proxy_pass http://martin:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. Inference Services
    location /inference/main/ {
        rewrite ^/inference/main/(.*)$ /$1 break;
        proxy_pass http://inference:8001;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /inference/lae/ {
        rewrite ^/inference/lae/(.*)$ /$1 break;
        proxy_pass http://inference-lae-dino:8001;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /inference/mmrotate/ {
        rewrite ^/inference/mmrotate/(.*)$ /$1 break;
        proxy_pass http://inference-mmrotate:8001;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /inference/lsknet/ {
        rewrite ^/inference/lsknet/(.*)$ /$1 break;
        proxy_pass http://inference-lsknet:8001;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /inference/sam2/ {
        rewrite ^/inference/sam2/(.*)$ /$1 break;
        proxy_pass http://inference-sam2:8001;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 6. FMV HLS static files
    location /fmv/ {
        alias /data/fmv/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "no-cache";
        gzip off;
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp4 mp4 m4s;
            video/MP2T ts;
        }
    }
}
