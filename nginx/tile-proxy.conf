proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=tiles:100m max_size=10g inactive=24h use_temp_path=off;

server {
    listen 80;
    server_name localhost;
    client_max_body_size 20g;

    # Docker's embedded DNS. Re-resolving each request lets nginx tolerate
    # container restarts (new IPs) and profile-gated services that may not be
    # running yet — without that, nginx caches DNS at startup and goes 502
    # the moment a sibling container is recreated.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 1. Frontend UI
    location / {
        set $upstream_frontend frontend;
        proxy_pass http://$upstream_frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Backend API
    location /api/ {
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8080;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8080;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Titiler (Tiles)
    location /tiles/ {
        set $upstream_titiler titiler;
        rewrite ^/tiles/(.*)$ /$1 break;
        proxy_pass http://$upstream_titiler:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tile caching
        proxy_cache tiles;
        proxy_cache_valid 200 24h;
        proxy_cache_use_stale error timeout invalid_header updating;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 4. Martin (Vector Tiles)
    location /maps/ {
        set $upstream_martin martin;
        rewrite ^/maps/(.*)$ /$1 break;
        proxy_pass http://$upstream_martin:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. Offline basemap tiles — served by the dedicated `assets` container.
    #    Strict air-gap: there is intentionally no public-internet fallback.
    #    A missing tile returns 404; the frontend basemap layer caps tile
    #    fetches at maxNativeZoom=10 (the pre-baked pyramid ceiling) so the
    #    map upscales rather than 404'ing past z=10.
    location /basemap/ {
        set $upstream_assets assets;
        proxy_pass http://$upstream_assets:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache tiles;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout invalid_header updating;
        add_header X-Cache-Status $upstream_cache_status;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 5b. Self-hosted webfonts from the `assets` image. Scoped to
    #    /assets/fonts/ so it does not shadow the SPA's /assets/index-*.js
    #    bundle produced by Vite (which must reach the frontend container
    #    via `location /`). The trailing slash on proxy_pass strips the
    #    /assets/ prefix so the request hits /fonts/... on assets.
    location /assets/fonts/ {
        set $upstream_assets assets;
        rewrite ^/assets/fonts/(.*)$ /fonts/$1 break;
        proxy_pass http://$upstream_assets:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache tiles;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 6. FMV HLS static files
    location /fmv/ {
        alias /data/fmv/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "no-cache";
        gzip off;
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp4 mp4 m4s;
            video/MP2T ts;
        }
    }
}
