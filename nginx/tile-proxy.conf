proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=tiles:100m max_size=10g inactive=24h use_temp_path=off;

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://titiler:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tile caching
        proxy_cache tiles;
        proxy_cache_valid 200 24h;
        proxy_cache_use_stale error timeout invalid_header updating;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;

        add_header X-Cache-Status $upstream_cache_status;
    }

    # FMV HLS static files — served directly by nginx, bypassing backend
    # Accepts-Ranges and no gzip so hls.js can do byte-range requests
    location /fmv/ {
        alias /data/fmv/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "no-cache";
        gzip off;
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp4 mp4 m4s;
            video/MP2T ts;
        }
    }
}
