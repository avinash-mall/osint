services:
  neo4j:
    image: neo4j:5.26.26-community-ubi10
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgis:
    image: postgis/postgis:18-3.6
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=sentinel
    volumes:
      # PG 18+ stores data under a major-version subdir (/var/lib/postgresql/18/docker)
      # to enable in-place pg_upgrade. Mount the parent dir, NOT /var/lib/postgresql/data.
      - pg_data:/var/lib/postgresql
      - ./backend/init_postgis.sql:/docker-entrypoint-initdb.d/init_postgis.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: sentinel-backend:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
      - POSTGIS_URI=postgresql://sentinel:sentinel@postgis:5432/sentinel
      - TITILER_URL=http://titiler:8080
      - INFERENCE_SAM3_URL=http://inference-sam3:8001
      - IMAGERY_PATH=/data/imagery
      - FMV_PATH=/data/fmv
      - DATASET_PATH=/data/datasets
      - PYTHONPATH=/app
      - DETECTION_THRESHOLD_PROFILE=${DETECTION_THRESHOLD_PROFILE:-recall_review}
      - GLOBAL_CONFIDENCE_FLOOR=${GLOBAL_CONFIDENCE_FLOOR:-0.0}
      - HIGH_CONFIDENCE_THRESHOLD=${HIGH_CONFIDENCE_THRESHOLD:-0.8}
      - MODEL_VERSION=${MODEL_VERSION:-sam3-open-vocab}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-sentinel-dev-admin}
      - SESSION_SECRET=${SESSION_SECRET:-dev-session-secret-replace-in-production}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-12}
      - FORCE_HTTPS=${FORCE_HTTPS:-0}
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
      postgis:
        condition: service_healthy
      redis:
        condition: service_started
      titiler:
        condition: service_started
    volumes:
      - ./backend:/app
      - imagery_data:/data/imagery
      - fmv_data:/data/fmv
      - dataset_data:/data/datasets
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s = socket.socket(); s.settimeout(2); exit(0 if s.connect_ex((\"127.0.0.1\", 8080)) == 0 else 1)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  llm-local-proxy:
    # Pinned for reproducible air-gap shipping. Update the digest after a
    # connected-host `docker pull alpine/socat:1.8.0.3` and verify with
    # `docker inspect --format '{{index .RepoDigests 0}}' alpine/socat:1.8.0.3`.
    image: alpine/socat:1.8.0.3
    profiles:
      - llm-proxy
    network_mode: host
    command: TCP-LISTEN:18001,fork,reuseaddr,bind=0.0.0.0 TCP:127.0.0.1:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 18001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    image: sentinel-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=
      - VITE_TITILER_URL=/tiles
      - VITE_TILE_PROXY_URL=/tiles
      - VITE_MARTIN_URL=/maps
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  titiler:
    # Pinned for reproducible air-gap shipping; bump the tag after testing
    # on a connected host and record the @sha256 digest in
    # docs/offline-deployment.md.
    image: ghcr.io/developmentseed/titiler:2.0.2
    volumes:
      - imagery_data:/data/imagery:ro
    environment:
      - PORT=8080
      - WORKERS_PER_CORE=1
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s = socket.socket(); s.settimeout(2); exit(0 if s.connect_ex((\"127.0.0.1\", 8080)) == 0 else 1)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  martin:
    # Pinned for reproducible air-gap shipping; bump the tag after testing
    # on a connected host and record the @sha256 digest in
    # docs/offline-deployment.md.
    image: ghcr.io/maplibre/martin:1.9.1
    restart: on-failure
    environment:
      - DATABASE_URL=postgresql://sentinel:sentinel@postgis:5432/sentinel
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  inference-sam3:
    build:
      context: ./inference-sam3
      dockerfile: Dockerfile.gpu
      args:
        CUDA_VERSION: ${SAM3_CUDA_VERSION:?Run python scripts/configure_host.py first}
        UBUNTU_VERSION: ${SAM3_UBUNTU_VERSION:?Run python scripts/configure_host.py first}
        TORCH_INDEX_URL: ${SAM3_TORCH_INDEX_URL:?Run python scripts/configure_host.py first}
        TORCH_VERSION: ${SAM3_TORCH_VERSION:?Run python scripts/configure_host.py first}
        TORCHVISION_VERSION: ${SAM3_TORCHVISION_VERSION:?Run python scripts/configure_host.py first}
        TORCH_CUDA_ARCH_LIST: ${SAM3_TORCH_CUDA_ARCH_LIST:?Run python scripts/configure_host.py first}
        SAM3_INSTALL_FAST_DEPS: ${SAM3_INSTALL_FAST_DEPS:-1}
        HF_TOKEN: ${HF_TOKEN:-}
    image: sentinel-inference-sam3:gpu
    gpus: all
    # Kill-and-respawn is how /unload reliably frees SAM3's VRAM (Python
    # refs inside the upstream library survive del+empty_cache). The hot
    # path is: backend POST /unload → main.py kills the process via
    # os._exit(1) → docker compose respawns within ~5 s.
    restart: unless-stopped
    environment:
      GPU_MODEL: ${GPU_MODEL:?Run python scripts/configure_host.py first}
      SAM3_GPU_PROFILE: ${SAM3_GPU_PROFILE:?Run python scripts/configure_host.py first}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      DEVICE: ${SAM3_DEVICE:-auto}
      CUDA_UNSUPPORTED_ARCH_POLICY: ${CUDA_UNSUPPORTED_ARCH_POLICY:-cpu}
      CPU_THREADS: auto
      WEB_CONCURRENCY: "1"
      SAM3_IMAGE_MODEL_ID: ${SAM3_IMAGE_MODEL_ID:-facebook/sam3}
      SAM3_USE_MULTIPLEX: ${SAM3_USE_MULTIPLEX:-1}
      SAM3_COMPILE_IMAGE: ${SAM3_COMPILE_IMAGE:-0}
      SAM3_COMPILE_VIDEO: ${SAM3_COMPILE_VIDEO:-0}
      SAM3_WARM_UP_VIDEO: ${SAM3_WARM_UP_VIDEO:-1}
      SAM3_PRELOAD_MODELS: ${SAM3_PRELOAD_MODELS:-0}
      SAM3_PRELOAD_PROFILE: ${SAM3_PRELOAD_PROFILE:-}
      # Runtime tuning generated per-host by scripts/configure_host.py
      # (defaults below are safe fallbacks; the .env block overrides on
      # any machine where configure_host.py has run).
      SAM3_ENABLE_TF32: ${SAM3_ENABLE_TF32:-1}
      SAM3_GPU_VRAM_GIB: ${SAM3_GPU_VRAM_GIB:-}
      SAM3_MULTIPLEX_MIN_VRAM_MIB: ${SAM3_MULTIPLEX_MIN_VRAM_MIB:-20480}
      FMV_TRACK_HEIGHT: ${FMV_TRACK_HEIGHT:-540}
      FMV_TRACK_FRAMES_PER_WINDOW: ${FMV_TRACK_FRAMES_PER_WINDOW:-48}
      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      # PyTorch 2.8+ renamed the variable; set both for forward + backward compat.
      PYTORCH_ALLOC_CONF: ${PYTORCH_ALLOC_CONF:-expandable_segments:True}
      # Force PyTorch's `nn.Linear` / `addmm` off cuBLAS-Lt. The cuBLAS-Lt
      # context gets stateful corruption in the long-running service after
      # the model load sequence (multiplex + image + optional models) and
      # then every subsequent `cublasLtMatmulAlgoGetHeuristic` returns
      # NOT_INITIALIZED — even on otherwise healthy A100 80GB / driver
      # 595.71.05 / torch 2.10.0+cu130. Routing addmm through plain
      # cuBLAS sidesteps it. ~5–15% throughput hit on text encoder.
      # Revisit when the upstream PyTorch / cu130 cuBLAS-Lt bug is fixed.
      DISABLE_ADDMM_CUDA_LT: ${DISABLE_ADDMM_CUDA_LT:-1}
      SAM3_BATCHED_TEXT: ${SAM3_BATCHED_TEXT:-1}
      SAM3_BATCHED_TEXT_CHUNK_SIZE: ${SAM3_BATCHED_TEXT_CHUNK_SIZE:-8}
      DINOV3_SAT_MODEL_ID: ${DINOV3_SAT_MODEL_ID:-facebook/dinov3-vitl16-pretrain-sat493m}
      PRITHVI_BACKBONE_ID: ${PRITHVI_BACKBONE_ID:-ibm-nasa-geospatial/Prithvi-EO-2.0-600M-TL}
      TERRAMIND_MODEL_ID: ${TERRAMIND_MODEL_ID:-terramind_v1_large}
      SAM3_TEXT_THRESHOLD: ${SAM3_TEXT_THRESHOLD:-0.30}
      SAM3_BOX_THRESHOLD: ${SAM3_BOX_THRESHOLD:-0.25}
      # AMG (Automatic Mask Generation) — per-profile defaults emitted by
      # scripts/configure_host.py into the GPU-generated .env block.
      SAM3_AMG_ENABLED: ${SAM3_AMG_ENABLED:-1}
      SAM3_AMG_GRID_SIZE: ${SAM3_AMG_GRID_SIZE:-32}
      SAM3_AMG_RESEED_FRAMES: ${SAM3_AMG_RESEED_FRAMES:-4}
      SAM3_AMG_NMS_IOU: ${SAM3_AMG_NMS_IOU:-0.5}
      SAM3_AMG_POINT_BOX_NORM: ${SAM3_AMG_POINT_BOX_NORM:-0.02}
      SAM3_AMG_TRACK_IOU_MIN: ${SAM3_AMG_TRACK_IOU_MIN:-0.30}
      SAM3_AMG_TRACK_BUFFER: ${SAM3_AMG_TRACK_BUFFER:-12}
      # Phase 3 quality knobs (SAM-2-style filters + Grounding-DINO labels).
      SAM3_AMG_PRED_IOU_THRESH: ${SAM3_AMG_PRED_IOU_THRESH:-0.50}
      SAM3_AMG_MIN_AREA_PX: ${SAM3_AMG_MIN_AREA_PX:-200}
      SAM3_AMG_MAX_AREA_FRAC: ${SAM3_AMG_MAX_AREA_FRAC:-0.50}
      SAM3_AMG_EDGE_FRAC_MAX: ${SAM3_AMG_EDGE_FRAC_MAX:-0.80}
      SAM3_AMG_STABILITY_THRESH: ${SAM3_AMG_STABILITY_THRESH:-0.0}
      SAM3_AMG_STABILITY_DELTA: ${SAM3_AMG_STABILITY_DELTA:-0.01}
      SAM3_AMG_MIN_CONSECUTIVE_FRAMES: ${SAM3_AMG_MIN_CONSECUTIVE_FRAMES:-2}
      SAM3_AMG_LABEL_VIA_GD: ${SAM3_AMG_LABEL_VIA_GD:-1}
      SAM3_AMG_LABEL_PROMPTS: ${SAM3_AMG_LABEL_PROMPTS:-vehicle,person,building,road,vegetation,water,aircraft,vessel,animal,equipment,structure,tower,pole,sign,debris,container}
      SAM3_AMG_LABEL_GD_THRESH: ${SAM3_AMG_LABEL_GD_THRESH:-0.45}
      SAM3_AMG_LABEL_GD_THRESH_ONTOLOGY: ${SAM3_AMG_LABEL_GD_THRESH_ONTOLOGY:-0.20}
      SAM3_AMG_LABEL_IOU_MIN: ${SAM3_AMG_LABEL_IOU_MIN:-0.20}
      # Phase 5: drone-HUD overlay auto-detection + post-detection filter.
      SAM3_AMG_HUD_MASK_ENABLED: ${SAM3_AMG_HUD_MASK_ENABLED:-1}
      SAM3_AMG_HUD_STD_THRESH: ${SAM3_AMG_HUD_STD_THRESH:-3.0}
      SAM3_AMG_HUD_SAMPLES: ${SAM3_AMG_HUD_SAMPLES:-5}
      SAM3_AMG_HUD_OVERLAP_MAX: ${SAM3_AMG_HUD_OVERLAP_MAX:-0.5}
      # Phase 4: detector selection — "gd" (Grounding-DINO-first, fast) or
      # "grid" (dense 16×16 AMG, vocab-free, slow).
      SAM3_AMG_DETECTOR: ${SAM3_AMG_DETECTOR:-gd}
      SAM3_PRITHVI_OVERLAY_THRESHOLD: ${SAM3_PRITHVI_OVERLAY_THRESHOLD:-0.30}
      SAM3_SAR_CONF_CAP: ${SAM3_SAR_CONF_CAP:-0.85}
      SAM3_OBB_OPENING_KERNEL_PCT: ${SAM3_OBB_OPENING_KERNEL_PCT:-0.01}
      SAM3_OBB_MIN_AREA_PX: ${SAM3_OBB_MIN_AREA_PX:-4}
      ONTOLOGY_BACKEND_URL: ${ONTOLOGY_BACKEND_URL:-http://backend:8080}
      SAM3_EMBED_DETECTIONS: ${SAM3_EMBED_DETECTIONS:-0}
      # Per-component runtime loader flags. The checked-in .env enables the full
      # auxiliary stack; turn individual flags off on memory-constrained GPUs.
      SAM3_LOAD_OPTIONAL_MODELS: ${SAM3_LOAD_OPTIONAL_MODELS:-1}
      SAM3_LOAD_DINOV3_SAT: ${SAM3_LOAD_DINOV3_SAT:-1}
      # DINOV3_LVD removed: NaN on real video crops + 2.5x slower than SAT.
      SAM3_LOAD_PRITHVI:    ${SAM3_LOAD_PRITHVI:-1}
      SAM3_LOAD_TERRAMIND:  ${SAM3_LOAD_TERRAMIND:-1}
      # Specialist detectors (run alongside SAM 3 on every chip).
      # DEFENCE_YOLO removed — produced 1297 false positives across DOTA val
      # with zero true positives (see docs/inference_layer_comparison.md).
      SAM3_LOAD_DOTA_OBB:        ${SAM3_LOAD_DOTA_OBB:-1}
      SAM3_LOAD_GROUNDING_DINO:  ${SAM3_LOAD_GROUNDING_DINO:-1}
      DOTA_OBB_MODEL_ID:         ${DOTA_OBB_MODEL_ID:-yolo11n-obb.pt}
      GROUNDING_DINO_REPO_ID:    ${GROUNDING_DINO_REPO_ID:-IDEA-Research/grounding-dino-tiny}
      GROUNDING_DINO_THRESHOLD:  ${GROUNDING_DINO_THRESHOLD:-0.20}
      GROUNDING_DINO_TEXT_THRESHOLD: ${GROUNDING_DINO_TEXT_THRESHOLD:-0.15}
      # Category-level presence gate (SegEarth-OV-3 idea). 0.0 disables.
      # 0.40 suppresses prompts whose best mask still has weak presence,
      # which is what produces hallucinated detections on absent concepts.
      SAM3_CATEGORY_THRESHOLD: ${SAM3_CATEGORY_THRESHOLD:-0.20}
      # SAM 3 weights source: "official" → gated facebook/sam3 (needs HF_TOKEN),
      # "mirror" → 1038lab/sam3 non-gated mirror (HF_TOKEN optional).
      SAM3_WEIGHTS_SOURCE:  ${SAM3_WEIGHTS_SOURCE:-official}
      SAM3_MIRROR_REPO_ID:  ${SAM3_MIRROR_REPO_ID:-1038lab/sam3}
      SAM3_MIRROR_FILENAME: ${SAM3_MIRROR_FILENAME:-sam3.safetensors}
      MODEL_VERSION: ${SAM3_MODEL_VERSION:-sam3-image+sam3.1-video+dinov3-sat-l+prithvi+terramind+dota-obb+grounding-dino}
      HF_HOME: /models/hf
      HUGGINGFACE_HUB_CACHE: /models/hf/hub
      TORCH_HOME: /models/torch
      XDG_CACHE_HOME: /models/cache
      # First-run: allow online HF downloads into /models (sam3_models volume).
      # Flip both to "1" once the volume is populated to enforce offline.
      # Default to offline mode: the image build bakes every model under
      # /models/hf, so the runtime should never need to reach the network.
      # Override with SAM3_HF_HUB_OFFLINE=0 only in dev when iterating on
      # the model list.
      HF_HUB_OFFLINE: ${SAM3_HF_HUB_OFFLINE:-1}
      TRANSFORMERS_OFFLINE: ${SAM3_TRANSFORMERS_OFFLINE:-1}
      # HF_TOKEN is required for the official gated facebook/sam3* weights and
      # DINOv3 (also gated). Pass an empty string when SAM3_WEIGHTS_SOURCE=mirror
      # AND SAM3_LOAD_DINOV3_*=0 to run fully un-tokened.
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./inference-sam3:/app
      - ./backend/detection_policy.py:/app/detection_policy.py:ro
      # Model weights are baked into the image under /models/hf during build.
      # For dev iteration, re-add `- sam3_models:/models` via a compose
      # override file to share an incremental cache between builds.
      - imagery_data:/data/imagery:ro
      - fmv_data:/data/fmv:ro
    working_dir: /app
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import json, urllib.request; data=json.load(urllib.request.urlopen(\"http://127.0.0.1:8001/health\", timeout=5)); raise SystemExit(0 if data.get(\"model_loaded\") and not data.get(\"model_error\") else 1)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 420s

  redis:
    # Pinned for reproducible air-gap shipping.
    image: redis:8-alpine
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: sentinel-backend:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: celery -A worker.celery_app worker --loglevel=info -Q imagery,default
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
      - POSTGIS_URI=postgresql://sentinel:sentinel@postgis:5432/sentinel
      - INFERENCE_SAM3_URL=http://inference-sam3:8001
      - IMAGERY_PATH=/data/imagery
      - FMV_PATH=/data/fmv
      - DATASET_PATH=/data/datasets
      - PYTHONPATH=/app
      - DETECTION_THRESHOLD_PROFILE=${DETECTION_THRESHOLD_PROFILE:-recall_review}
      - GLOBAL_CONFIDENCE_FLOOR=${GLOBAL_CONFIDENCE_FLOOR:-0.0}
      - HIGH_CONFIDENCE_THRESHOLD=${HIGH_CONFIDENCE_THRESHOLD:-0.8}
      - MODEL_VERSION=${MODEL_VERSION:-sam3-open-vocab}
      - INFERENCE_SPEED_PROFILE=${INFERENCE_SPEED_PROFILE:-fast_review}
      - INFERENCE_CHIP_SIZE=${INFERENCE_CHIP_SIZE:-1008}
      - INFERENCE_CHIP_OVERLAP=${INFERENCE_CHIP_OVERLAP:-252}
      - MAX_INFERENCE_CHIPS=${MAX_INFERENCE_CHIPS:-256}
      - INFERENCE_CHIP_CONCURRENCY=${INFERENCE_CHIP_CONCURRENCY:-1}
      - INFERENCE_CHIP_TIMEOUT_S=${INFERENCE_CHIP_TIMEOUT_S:-600}
    depends_on:
      neo4j:
        condition: service_healthy
      postgis:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - imagery_data:/data/imagery
      - fmv_data:/data/fmv
      - dataset_data:/data/datasets
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f celery || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Strict-air-gap static-file service. Hosts the baked-in basemap tile
  # pyramid and the self-hosted IBM Plex webfonts. The reverse proxy
  # (`nginx` below) routes `/basemap/` and `/assets/` to this service so the
  # browser never reaches the public internet.
  #
  # The Dockerfile runs both fetchers inside the build — no host-side
  # pre-bake required. First build is slow (4-8 h for z=0..10); subsequent
  # builds use the BuildKit cache mount on /cache/basemap and complete in
  # seconds. Override BASEMAP_ZOOM for a quick smoke build:
  #   BASEMAP_ZOOM=0-4 docker compose up -d --build assets
  assets:
    build:
      context: .
      dockerfile: assets/Dockerfile
      args:
        BASEMAP_ZOOM: "${BASEMAP_ZOOM:-0-10}"
        BASEMAP_CONCURRENCY: "${BASEMAP_CONCURRENCY:-16}"
    image: sentinel-assets:offline
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: ./nginx
    image: sentinel-nginx:offline
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - fmv_data:/data/fmv:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      titiler:
        condition: service_healthy
      martin:
        condition: service_healthy
      assets:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  pg_data:
  imagery_data:
  fmv_data:
  dataset_data:
