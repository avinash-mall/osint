services:
  neo4j:
    image: neo4j:5.20.0
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgis:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=gotham
      - POSTGRES_PASSWORD=gotham
      - POSTGRES_DB=gotham
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/init_postgis.sql:/docker-entrypoint-initdb.d/init_postgis.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotham -d gotham"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: sentinelos-backend:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "8080:8080"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
      - POSTGIS_URI=postgresql://gotham:gotham@postgis:5432/gotham
      - TITILER_URL=http://titiler:8080
      - INFERENCE_URL=http://inference:8001
      - INFERENCE_LAE_DINO_URL=http://inference-lae-dino:8001
      - INFERENCE_MMROTATE_URL=http://inference-mmrotate:8001
      - INFERENCE_LSKNET_URL=http://inference-lsknet:8001
      - INFERENCE_SAM2_URL=http://inference-sam2:8001
      - IMAGERY_PATH=/data/imagery
      - FMV_PATH=/data/fmv
      - DATASET_PATH=/data/datasets
      - DETECTION_THRESHOLD_PROFILE=recall_review
      - MODEL_VERSION=geoint-yolov8-obb-optical-defense
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
      postgis:
        condition: service_healthy
      redis:
        condition: service_started
      titiler:
        condition: service_started
    volumes:
      - ./backend:/app
      - imagery_data:/data/imagery
      - fmv_data:/data/fmv
      - dataset_data:/data/datasets

  llm-local-proxy:
    image: alpine/socat:latest
    network_mode: host
    command: TCP-LISTEN:18001,fork,reuseaddr,bind=0.0.0.0 TCP:127.0.0.1:8001
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: sentinelos-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_TITILER_URL=http://localhost:8081
      - VITE_TILE_PROXY_URL=http://localhost:8090
      - VITE_MARTIN_URL=http://localhost:3001

  titiler:
    image: developmentseed/titiler:latest
    ports:
      - "8081:8080"
    volumes:
      - imagery_data:/data/imagery:ro
    environment:
      - PORT=8080
      - WORKERS_PER_CORE=1

  martin:
    image: maplibre/martin:latest
    ports:
      - "3001:3000"
    restart: on-failure
    environment:
      - DATABASE_URL=postgresql://gotham:gotham@postgis:5432/gotham
    depends_on:
      postgis:
        condition: service_healthy

  inference:
    build:
      context: ./inference
      args:
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu124}
    image: sentinelos-inference:latest
    ports:
      - "8002:8001"
    environment:
      - DEVICE=auto
      - TRAINED_MODEL_PATH=/app/models/geoint_yolov8_obb.pt
      - DETECTION_THRESHOLD_PROFILE=recall_review
      - CONFIDENCE_THRESHOLD=0.12
      - NMS_IOU_THRESHOLD=0.55
      - MODEL_VERSION=geoint-yolov8-obb-optical-defense
    volumes:
      - ./inference:/app
      - imagery_data:/data/imagery:ro
      - ./training_dataset:/training_dataset
    working_dir: /app

  inference-lae-dino:
    build:
      context: ./inference-lae-dino
      dockerfile: Dockerfile.cpu
    image: sentinelos-inference-lae-dino:cpu
    ports:
      - "8004:8001"
    environment:
      DEVICE: cpu
      CPU_THREADS: auto
      WEB_CONCURRENCY: "1"
      LAE_PROMPT_PROFILE: official_lae80c
      LAE_PROMPT_CHUNK_SIZE: "20"
      DETECTION_THRESHOLD_PROFILE: recall_review
      CONFIDENCE_THRESHOLD: "0.25"
      MAX_DETECTIONS_PER_CHIP: "300"
      LAE_BATCH_MAX_SIZE: "1"
      LAE_BATCH_TIMEOUT_MS: "0"
      MODEL_VERSION: grounding-dino-base
      GROUNDING_DINO_MODEL_ID: /opt/grounding-dino
      GROUNDING_DINO_BOX_THRESHOLD: "0.25"
      GROUNDING_DINO_TEXT_THRESHOLD: "0.25"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    volumes:
      - ./inference-lae-dino:/app
      - imagery_data:/data/imagery:ro
    working_dir: /app

  inference-mmrotate:
    build:
      context: ./inference-mmrotate
    image: sentinelos-inference-mmrotate:gpu
    ports:
      - "8005:8001"
    gpus: all
    environment:
      DEVICE: auto
      CPU_THREADS: auto
      WEB_CONCURRENCY: "1"
      DETECTION_THRESHOLD_PROFILE: recall_review
      MMROTATE_CONFIDENCE_THRESHOLD: "0.10"
      MAX_DETECTIONS_PER_CHIP: "300"
      MODEL_VERSION: mmrotate-oriented-rcnn-dota
      MMROTATE_CONFIG: /opt/mmrotate/configs/oriented_rcnn/oriented-rcnn-le90_r50_fpn_1x_dota.py
      MMROTATE_MODEL_DIR: /models
      MMROTATE_CHECKPOINT: /models/oriented_rcnn_r50_fpn_1x_dota_le90-6d2b2ce0.pth
    volumes:
      - ./inference-mmrotate:/app
      - mmrotate_models:/models
      - imagery_data:/data/imagery:ro
    working_dir: /app

  inference-lsknet:
    build: ./inference-lsknet
    image: sentinelos-inference-lsknet:gpu
    ports:
      - "8006:8001"
    gpus: all
    environment:
      DEVICE: auto
      CPU_THREADS: auto
      WEB_CONCURRENCY: "2"
      DETECTION_THRESHOLD_PROFILE: recall_review
      LSKNET_CONFIDENCE_THRESHOLD: "0.10"
      MAX_DETECTIONS_PER_CHIP: "300"
      MODEL_VERSION: lsknet-s-dota
    volumes:
      - ./inference-lsknet:/app
      - lsknet_models:/models
      - imagery_data:/data/imagery:ro
    working_dir: /app

  inference-sam2:
    build: ./inference-sam2
    image: sentinelos-inference-sam2:gpu
    ports:
      - "8007:8001"
    gpus: all
    environment:
      DEVICE: auto
      CPU_THREADS: auto
      WEB_CONCURRENCY: "1"
      SAM2_MODEL_SIZE: "large"
    volumes:
      - ./inference-sam2:/app
      - sam2_models:/models
      - imagery_data:/data/imagery:ro
    working_dir: /app

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  worker:
    build: ./backend
    image: sentinelos-backend:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: celery -A worker.celery_app worker --loglevel=info -Q imagery,default
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
      - POSTGIS_URI=postgresql://gotham:gotham@postgis:5432/gotham
      - INFERENCE_URL=http://inference:8001
      - INFERENCE_LAE_DINO_URL=http://inference-lae-dino:8001
      - INFERENCE_MMROTATE_URL=http://inference-mmrotate:8001
      - INFERENCE_LSKNET_URL=http://inference-lsknet:8001
      - INFERENCE_SAM2_URL=http://inference-sam2:8001
      - IMAGERY_PATH=/data/imagery
      - FMV_PATH=/data/fmv
      - DATASET_PATH=/data/datasets
      - DETECTION_THRESHOLD_PROFILE=recall_review
      - MODEL_VERSION=geoint-yolov8-obb-optical-defense
      - INFERENCE_CHIP_SIZE=1024
      - INFERENCE_CHIP_OVERLAP=256
      - MAX_INFERENCE_CHIPS=0
      # Chip dispatch concurrency to inference providers. The Grounding DINO
      # container batches concurrent requests internally; without backend-side
      # parallelism the batcher never gets multiple items to batch.
      - INFERENCE_CHIP_CONCURRENCY=16
      - INFERENCE_CHIP_TIMEOUT_S=120
    depends_on:
      neo4j:
        condition: service_healthy
      postgis:
        condition: service_healthy
      redis:
        condition: service_started
      inference:
        condition: service_started
      inference-mmrotate:
        condition: service_started
      inference-lsknet:
        condition: service_started
      inference-sam2:
        condition: service_started
    volumes:
      - ./backend:/app
      - imagery_data:/data/imagery
      - fmv_data:/data/fmv
      - dataset_data:/data/datasets

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx/tile-proxy.conf:/etc/nginx/conf.d/default.conf
      - fmv_data:/data/fmv:ro
    depends_on:
      - titiler

volumes:
  neo4j_data:
  pg_data:
  imagery_data:
  fmv_data:
  dataset_data:
  mmrotate_models:
  lsknet_models:
  sam2_models:
