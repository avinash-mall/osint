version: "3.8"

services:
  neo4j:
    image: neo4j:5.20.0
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    image: gotham-backend:latest
    ports:
      - "8080:8080"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    image: gotham-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html

  inference:
    image: python:3.11-slim
    command: >
      bash -c "pip install fastapi uvicorn pydantic && uvicorn main:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"
    volumes:
      - ./inference:/app
    working_dir: /app

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  worker:
    build: ./backend
    image: gotham-backend:latest
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
      - INFERENCE_URL=http://inference:8001
    depends_on:
      - neo4j
      - redis
      - inference
    volumes:
      - ./backend:/app

volumes:
  neo4j_data: