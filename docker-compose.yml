services:
  neo4j:
    image: neo4j:5.20.0
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgis:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=gotham
      - POSTGRES_PASSWORD=gotham
      - POSTGRES_DB=gotham
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/init_postgis.sql:/docker-entrypoint-initdb.d/init_postgis.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotham -d gotham"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: sentinelos-backend:latest
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "8080:8080"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
      - POSTGIS_URI=postgresql://gotham:gotham@postgis:5432/gotham
      - TITILER_URL=http://titiler:8080
      - INFERENCE_URL=http://inference:8001
      - INFERENCE_LAE_DINO_URL=http://inference-lae-dino:8001
      - IMAGERY_PATH=/data/imagery
      - FMV_PATH=/data/fmv
      - DATASET_PATH=/data/datasets
      - DETECTION_THRESHOLD_PROFILE=recall_review
      - MODEL_VERSION=geoint-yolov8-obb-optical-defense
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
      postgis:
        condition: service_healthy
      redis:
        condition: service_started
      titiler:
        condition: service_started
    volumes:
      - ./backend:/app
      - imagery_data:/data/imagery
      - fmv_data:/data/fmv
      - dataset_data:/data/datasets

  frontend:
    build: ./frontend
    image: sentinelos-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_TITILER_URL=http://localhost:8081
      - VITE_TILE_PROXY_URL=http://localhost:8090
      - VITE_MARTIN_URL=http://localhost:3001

  titiler:
    image: developmentseed/titiler:latest
    ports:
      - "8081:8080"
    volumes:
      - imagery_data:/data/imagery:ro
    environment:
      - PORT=8080
      - WORKERS_PER_CORE=1

  martin:
    image: maplibre/martin:latest
    ports:
      - "3001:3000"
    restart: on-failure
    environment:
      - DATABASE_URL=postgresql://gotham:gotham@postgis:5432/gotham
    depends_on:
      postgis:
        condition: service_healthy

  inference:
    build:
      context: ./inference
      args:
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu124}
    image: sentinelos-inference:latest
    ports:
      - "8002:8001"
    environment:
      - DEVICE=auto
      - TRAINED_MODEL_PATH=/app/models/geoint_yolov8_obb.pt
      - DETECTION_THRESHOLD_PROFILE=recall_review
      - CONFIDENCE_THRESHOLD=0.12
      - NMS_IOU_THRESHOLD=0.55
      - MODEL_VERSION=geoint-yolov8-obb-optical-defense
    volumes:
      - ./inference:/app
      - imagery_data:/data/imagery:ro
      - ./training_dataset:/training_dataset
    working_dir: /app

  inference-lae-dino:
    build:
      context: ./inference-lae-dino
    image: sentinelos-inference-lae-dino:latest
    ports:
      - "8004:8001"
    environment:
      # DEVICE=auto picks GPU when present (via gpus: all in docker-compose.gpu.yml)
      # and falls back to CPU otherwise. Image is built on torch 2.7+cu128 which
      # supports sm_90 binaries + PTX fall-through, JIT-compiling for sm_120
      # (Blackwell, RTX 50-series) at first launch.
      - DEVICE=auto
      - DEFAULT_TEXT_PROMPT=aircraft . ship . vehicle . military_vehicle . storage_tank . bridge . harbor . airfield . building . infrastructure
      - DETECTION_THRESHOLD_PROFILE=recall_review
      - CONFIDENCE_THRESHOLD=0.30
      - MAX_DETECTIONS_PER_CHIP=300
      - MODEL_VERSION=lae-dino-swint-lae1m
      - TRANSFORMERS_OFFLINE=1
      - HF_HUB_OFFLINE=1
    volumes:
      - ./inference-lae-dino:/app
      - imagery_data:/data/imagery:ro
    working_dir: /app

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  worker:
    build: ./backend
    image: sentinelos-backend:latest
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: celery -A worker.celery_app worker --loglevel=info -Q imagery,default
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
      - POSTGIS_URI=postgresql://gotham:gotham@postgis:5432/gotham
      - INFERENCE_URL=http://inference:8001
      - INFERENCE_LAE_DINO_URL=http://inference-lae-dino:8001
      - IMAGERY_PATH=/data/imagery
      - FMV_PATH=/data/fmv
      - DATASET_PATH=/data/datasets
      - DETECTION_THRESHOLD_PROFILE=recall_review
      - MODEL_VERSION=geoint-yolov8-obb-optical-defense
      - INFERENCE_CHIP_SIZE=1024
      - INFERENCE_CHIP_OVERLAP=256
      - MAX_INFERENCE_CHIPS=0
    depends_on:
      neo4j:
        condition: service_healthy
      postgis:
        condition: service_healthy
      redis:
        condition: service_started
      inference:
        condition: service_started
    volumes:
      - ./backend:/app
      - imagery_data:/data/imagery
      - fmv_data:/data/fmv
      - dataset_data:/data/datasets

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx/tile-proxy.conf:/etc/nginx/conf.d/default.conf
      - fmv_data:/data/fmv:ro
    depends_on:
      - titiler

volumes:
  neo4j_data:
  pg_data:
  imagery_data:
  fmv_data:
  dataset_data:
