# Air-gap assets — small static-file server for basemap tiles + webfonts.
# Mounted into the stack as `http://assets:80` and proxied by the main
# reverse proxy under /basemap/ and /assets/. Self-contained; never makes
# outbound connections.

types {
    # Explicit woff2 mapping: some nginx:alpine images return
    # application/octet-stream otherwise, and Chromium silently refuses to
    # use the font.
    font/woff2  woff2;
    font/woff   woff;
    image/png   png;
    text/plain  txt;
    application/json json;
}

server {
    listen 80 default_server;
    server_name _;

    # Long-lived caching: tile and font payloads are content-addressable by
    # path, so an upgrade ships a new image with new files (and the reverse
    # proxy can be flushed by `docker compose restart nginx`).
    expires 30d;
    add_header Cache-Control "public, immutable, max-age=2592000" always;
    add_header X-Asset-Source "sentinel-assets" always;

    gzip on;
    gzip_types text/plain application/json;
    # Do NOT gzip woff2 or png — both are pre-compressed.

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /basemap/ {
        alias /usr/share/nginx/html/basemap/;
        try_files $uri =404;
    }

    location /terrain/ {
        alias /usr/share/nginx/html/terrain/;
        try_files $uri =404;
    }

    location /fonts/ {
        alias /usr/share/nginx/html/fonts/;
        try_files $uri =404;
    }

    # Build metadata + license — small files operators may want to inspect.
    location = /LICENSE.txt {
        root /usr/share/nginx/html;
    }
    location = /.build-metadata.json {
        root /usr/share/nginx/html;
        add_header Content-Type application/json;
    }

    location / {
        return 404;
    }
}
